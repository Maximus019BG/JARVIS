name: Versioning

#Permission for github token
permissions:
  contents: write

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: #Manual trigger

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # Set web/package.json version to match the release tag (vX.Y.Z -> X.Y.Z)
      - name: Set web package version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting web/package.json version to ${VERSION}"
          cd web
          pnpm pkg set version="${VERSION}"

      - name: Commit version bump
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/package.json
          git commit -m "chore(web): release ${GITHUB_REF_NAME}" || echo "No changes to commit"

      # Debug/info: helps confirm what ref triggered the workflow, and what refs exist.
      - name: Log refs
        shell: bash
        run: |
          set -euo pipefail
          echo "github.ref=${GITHUB_REF}"
          echo "github.ref_name=${GITHUB_REF_NAME}"
          echo "github.sha=${GITHUB_SHA}"
          echo "--- show-ref (heads/tags) ---"
          git show-ref --heads --tags | sed -n '1,200p'

      # Move a constant tag (e.g. "latest") to the commit of the pushed version tag.
      # This avoids ambiguous names like "master" which can exist as both a branch and a tag.
      - name: Update latest tag
        uses: EndBug/latest-tag@latest
        with:
          ref: latest
          description: "Latest release"

      - name: Create Release
        uses: "marvinpinto/action-automatic-releases@latest"
        id: auto_release
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          title: "${{ github.ref_name }}"
          prerelease: false
          automatic_release_tag: "${{ github.ref_name }}"